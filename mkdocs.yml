site_name: Abel Santos
site_description: Site de conteudos traduzidos por Abel Santos.
site_author: Abel S. C. Santos
site_url: https://www.abelsantos.com.br

theme:
  name: material
  language: pt-BR
  logo: icon-sm.png
  favicon: icon-sm.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
  palette:
    scheme: default
    primary: indigo
    accent: indigo

plugins:
  - search
  - macros
  - i18n:
      docs_structure: folder
      languages:
        - locale: pt
          default: true
          name: Português
          build: true
        - locale: en
          name: English
          build: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  books:
    - title: "Comentário sobre a Confissão de Fé de Westminster"
      author: "A. A. Hodge"
      color: "#1f3d2a"
      url: "hodge-archibald-alexander/um-comentario-sobre-a-confissao-de-fe/index.html"
    - title: "Coleção de Obras"
      author: "João Calvino"
      color: "#1a2744"
      url: "joao-calvino/index.html"
    - title: "Segunda Confissão de Fé Helvética"
      author: "Heinrich Bullinger"
      color: "#2d2416"
      url: "heinrich-bullinger/segunda-confissao-helvetica/index.html"
    - title: "Confissão de Fé de Westminster"
      author: "Assembleia de Westminster"
      color: "#162d3d"
      url: "assembleia-westminster/confissao-de-fé/indice.html"
    - title: "Credo Apostólico, Nicêno e Atanasiano"
      author: "Credos Históricos"
      color: "#2d2d2d"
      url: "credos/credos.html"
    - title: "Coleção de Obras"
      author: "Francis Turretini"
      color: "#3d1f1f"
      url: "françois-turretini/index.html"
    - title: "Exposição do Livro de Jó"
      author: "Joseph Caryl"
      color: "#2d1640"
      url: "joseph-caryl/index.html"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/separovichabel/abel-santos
  alternate:
    - name: Português
      link: ./
      lang: pt
    - name: English
      link: en/
      lang: en

use_directory_urls: false

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - codehilite
  - footnotes
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Conteúdo: index.md
  - Termos: TERMOS.md

# Diretório com os arquivos markdown
docs_dir: content

# Diretório onde o site gerado será salvo (padrão: site/)
site_dir: site